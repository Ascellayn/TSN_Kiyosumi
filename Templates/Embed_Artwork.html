<!--{Artwork_Date}-->
<div id="{Pixiv_ID}_p{Pixiv_sID}" class="Yae-Embed_Artwork">
	<div><a href="{Artwork_URL}" target="_blank"><img class="SNDL-Image" src="{Artwork_Image}"></a></div>
	<spacer></spacer>
	<div>
		<h2><a href="{Artwork_URL}" target="_blank">{Artwork_Title}</a> (N°{Pixiv_sID}) by <a href="{Artist_URL}" target="_blank">{Artist_Name}</a></h2>
		<p>{Artwork_Description}</p>
	</div>
	<spacer></spacer>
	<p>{Artwork_Tags}</p>
	<div class="SNDL-Source">
		<p>Artwork posted on {Artwork_Date} | ID: {Pixiv_ID}_p{Pixiv_sID}</p>
	</div>
</div>
